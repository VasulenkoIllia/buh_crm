services:
  db:
    image: postgres:16-alpine
    container_name: ${APP_NAME}-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      # Host-exposed ONLY for SSH-tunnel DB access (DataGrip); the app itself does NOT need it
      # (it reaches Postgres in-network on 5432). Bound to 127.0.0.1 so it's never public.
      # Default host port 15432 (high, unlikely to clash); override in .env if it's taken:
      #   DB_HOST_PORT=15433
      # then tunnel:  ssh -L 15432:127.0.0.1:${DB_HOST_PORT:-15432} user@buhcrm.workflo.space
      - "127.0.0.1:${DB_HOST_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME}-app
    init: true
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME}
      APP_DOMAIN: ${APP_DOMAIN}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      TZ: ${TZ}
      LOG_LEVEL: ${LOG_LEVEL}
      # in-container the API reaches Postgres by the compose service name `db`
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/uploads # client files + avatars (backed up with ./data)
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    # migrations run automatically on every start (idempotent); Dockerfile CMD:
    #   npx prisma migrate deploy && npm run start
    restart: unless-stopped
    networks:
      - app-net
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.buh-crm.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.buh-crm.entrypoints=websecure"
      - "traefik.http.routers.buh-crm.tls.certresolver=cf"
      - "traefik.http.services.buh-crm.loadbalancer.server.port=${PORT}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:' + (process.env.PORT || 3000) + '/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

networks:
  app-net:
    driver: bridge
  proxy:
    external: true
